<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>守护地球</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at center, #0b1d2a, #000);
    color: white;
}

/* 标题 */
.title {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 32px;
    letter-spacing: 2px;
    font-weight: 600;
}

/* 副标题 */
.subtitle {
    position: absolute;
    top: 80px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #aaa;
}

/* 按钮 */
.btn {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateX(-50%) scale(1.1);
}

/* 提示 */
.tip {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="title">🌍 Protect Our Earth</div>
<div class="subtitle">拖动地球，感受我们的家园</div>

<button class="btn" onclick="alert('从节约一滴水开始 🌱')">
    我能做什么？
</button>

<div class="tip">Drag to rotate • Scroll to zoom</div>

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

// 相机
const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 3;

// 渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 光源
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 3, 5);
scene.add(light);

// 地球材质
const textureLoader = new THREE.TextureLoader();
const earthTexture = textureLoader.load(
    "https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"
);

// 球体
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshStandardMaterial({
    map: earthTexture
});

const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

// 控制器（拖动旋转）
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// 动画
function animate() {
    requestAnimationFrame(animate);

    earth.rotation.y += 0.0015; // 自动慢速旋转
    controls.update();

    renderer.render(scene, camera);
}

animate();

// 自适应
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
